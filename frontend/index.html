<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Content Moderation</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="console">

    <header class="console__header">
        <span class="console__tag">
            MODERATION QUEUE
        </span>

        <h1>Real-Time Content Moderation</h1>

        <p class="console__subtitle">
            Analyze a comment and view probabilities for all six toxicity labels.
        </p>
    </header>

    <main class="panel">

        <label
            class="panel__label"
            for="comment-input"
        >
            Comment Text
        </label>

        <textarea
            id="comment-input"
            class="panel__textarea"
            placeholder="Enter a comment..."
            maxlength="2000"
            rows="6"
        ></textarea>

        <div class="panel__row">

            <span
                id="char-count"
                class="panel__count"
            >
                0 / 2000
            </span>

            <button
                id="predict-btn"
                class="panel__button"
            >
                <span id="btn-label">
                    Analyze Comment
                </span>
            </button>

        </div>

        <div
            id="error"
            class="error error--hidden"
        ></div>

        <div
            id="result"
            class="result result--hidden"
        >

            <h2>Result</h2>

            <div id="status"></div>

            <div id="labels"></div>

            <h3 style="margin-top:25px;">
                Prediction Probabilities
            </h3>

            <div id="prediction-list"></div>

        </div>

    </main>

</div>

<script src="/static/script.js"></script>

</body>

</html>
