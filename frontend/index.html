<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Moderation Demo</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --muted: #71717a;
      --accent: #6366f1;
      --neutral: #22c55e;
      --toxic: #f97316;
      --hate: #ef4444;
      --offensive: #eab308;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 1.75rem; margin-bottom: 0.25rem; }
    .subtitle { color: var(--muted); margin-bottom: 2rem; font-size: 0.95rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.5rem; }
    textarea {
      width: 100%;
      min-height: 120px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.75rem;
      font-size: 0.95rem;
      resize: vertical;
    }
    textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
    .controls { display: flex; gap: 1rem; align-items: center; margin-top: 1rem; flex-wrap: wrap; }
    .threshold-group { display: flex; align-items: center; gap: 0.5rem; flex: 1; }
    input[type="range"] { flex: 1; accent-color: var(--accent); }
    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.65rem 1.5rem;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result-label {
      font-size: 1.5rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .result-meta { color: var(--muted); font-size: 0.85rem; margin-top: 0.25rem; }
    .flagged-badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-left: 0.5rem;
    }
    .flagged-yes { background: #ef444433; color: #ef4444; }
    .flagged-no { background: #22c55e33; color: #22c55e; }
    .prob-bars { margin-top: 1.25rem; }
    .prob-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.6rem; }
    .prob-label { width: 110px; font-size: 0.85rem; text-transform: capitalize; }
    .prob-track { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .prob-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
    .prob-pct { width: 48px; text-align: right; font-size: 0.85rem; color: var(--muted); }
    .examples { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
    .example-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .example-btn:hover { border-color: var(--accent); color: var(--text); }
    .error { color: #ef4444; font-size: 0.9rem; margin-top: 0.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Real-Time Content Moderation</h1>
    

    <div class="card">
      <label for="text-input">Enter text to analyze</label>
      <textarea id="text-input" placeholder="Type a comment, message, or post..."></textarea>
      <div class="examples">
        <button class="example-btn" onclick="setExample('Thanks for the great tutorial!')">Neutral</button>
        <button class="example-btn" onclick="setExample('You are completely worthless.')">Toxic</button>
        <button class="example-btn" onclick="setExample('People like you don\'t belong here.')">Hate Speech</button>
        <button class="example-btn" onclick="setExample('What an idiot, shut up.')">Offensive</button>
      </div>
      <div class="controls">
        <div class="threshold-group">
          <label>Threshold: <span id="threshold-val">0.50</span></label>
          <input type="range" id="threshold" min="0.1" max="0.95" step="0.05" value="0.50"
                 oninput="document.getElementById('threshold-val').textContent = parseFloat(this.value).toFixed(2)" />
        </div>
        <button id="analyze-btn" onclick="analyze()">Analyze</button>
      </div>
      <p id="error" class="error hidden"></p>
    </div>

    <div class="card hidden" id="result-card">
      <div>
        <span class="result-label" id="result-label">—</span>
        <span class="flagged-badge" id="flagged-badge"></span>
      </div>
      <p class="result-meta">
        Confidence: <strong id="confidence">—</strong> ·
        Latency: <strong id="latency">—</strong> ·
        Backend: <strong id="backend">—</strong>
      </p>
      <div class="prob-bars" id="prob-bars"></div>
    </div>
  </div>

  <script>
    const LABEL_COLORS = {
      neutral: '#22c55e',
      toxic: '#f97316',
      hate_speech: '#ef4444',
      offensive: '#eab308',
    };

    /** Use FastAPI origin when served from :8000; otherwise target localhost API. */
    function getApiBase() {
      if (window.location.protocol === 'file:') return 'http://localhost:8000';
      if (window.location.port === '8000') return '';
      return 'http://localhost:8000';
    }

    async function parseJsonResponse(res) {
      const contentType = res.headers.get('content-type') || '';
      if (!contentType.includes('application/json')) {
        throw new Error(
          'API not reachable. Run: python -m api.app — then open http://localhost:8000 (not the HTML file directly).'
        );
      }
      return res.json();
    }

    function setExample(text) {
      document.getElementById('text-input').value = text;
    }

    async function analyze() {
      const text = document.getElementById('text-input').value.trim();
      const threshold = parseFloat(document.getElementById('threshold').value);
      const btn = document.getElementById('analyze-btn');
      const errorEl = document.getElementById('error');
      const apiBase = getApiBase();

      if (!text) { errorEl.textContent = 'Please enter some text.'; errorEl.classList.remove('hidden'); return; }
      errorEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Analyzing...';

      try {
        const res = await fetch(`${apiBase}/predict`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, threshold }),
        });
        const data = await parseJsonResponse(res);
        if (!res.ok) {
          throw new Error(data.detail || 'Prediction failed');
        }
        renderResult(data);
      } catch (e) {
        errorEl.textContent = e.message;
        errorEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Analyze';
      }
    }

    function renderResult(data) {
      document.getElementById('result-card').classList.remove('hidden');
      const labelEl = document.getElementById('result-label');
      labelEl.textContent = data.label.replace('_', ' ');
      labelEl.style.color = LABEL_COLORS[data.label] || '#e4e4e7';

      const badge = document.getElementById('flagged-badge');
      badge.textContent = data.flagged ? 'FLAGGED' : 'CLEAN';
      badge.className = 'flagged-badge ' + (data.flagged ? 'flagged-yes' : 'flagged-no');

      document.getElementById('confidence').textContent = (data.confidence * 100).toFixed(1) + '%';
      document.getElementById('latency').textContent = data.latency_ms + 'ms';
      document.getElementById('backend').textContent = data.backend;

      const bars = document.getElementById('prob-bars');
      bars.innerHTML = '';
      Object.entries(data.probabilities).forEach(([label, prob]) => {
        const row = document.createElement('div');
        row.className = 'prob-row';
        row.innerHTML = `
          <span class="prob-label">${label.replace('_', ' ')}</span>
          <div class="prob-track"><div class="prob-fill" style="width:0%;background:${LABEL_COLORS[label]}"></div></div>
          <span class="prob-pct">${(prob * 100).toFixed(1)}%</span>`;
        bars.appendChild(row);
        requestAnimationFrame(() => {
          row.querySelector('.prob-fill').style.width = (prob * 100) + '%';
        });
      });
    }

    document.getElementById('text-input').addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') analyze();
    });
  </script>
</body>
</html>
