<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comment Moderation Console</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="console">
    <header class="console__header">
      <span class="console__tag">MODERATION QUEUE</span>
    </header>

    <main class="panel">
      <label for="comment-input" class="panel__label">Comment text</label>
      <textarea
        id="comment-input"
        class="panel__textarea"
        placeholder="e.g. You are stupid"
        maxlength="2000"
        rows="6"
      ></textarea>
      <div class="panel__row">
        <span id="char-count" class="panel__count">0 / 2000</span>
        <button id="predict-btn" class="panel__button">
          <span id="btn-label">Analyze comment</span>
        </button>
      </div>

      <div id="result" class="result result--hidden">
        <div class="result__badge" id="result-badge">
          <span id="result-dot" class="result__dot"></span>
          <span id="result-label">Neutral</span>
        </div>
        <div class="result__confidence">
          <div class="result__confidence-row">
            <span>Model confidence</span>
            <span id="confidence-value">0%</span>
          </div>
          <div class="result__bar">
            <div id="confidence-fill" class="result__bar-fill"></div>
          </div>
        </div>
      </div>

      <div id="error" class="error error--hidden"></div>
    </main>

  </div>

  <script src="/static/script.js"></script>
</body>
</html>
